name: Update indicator data

on:
  schedule:
    # 4x/day: after US close, before/after India close, mid-Europe (UTC)
    - cron: "20 1,7,13,21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch indicators
        env:
          # Optional but recommended: free key from fred.stlouisfed.org/docs/api
          # makes the FRED-sourced gauges reliable from Actions runners.
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python3 scripts/fetch.py

      - name: Commit refreshed data
        run: |
          git config user.name "bubble-detector-bot"
          git config user.email "actions@github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: refresh indicators ($(date -u +%Y-%m-%dT%H:%MZ))"
            # Survive concurrent pushes to main (code commits land mid-run)
            git pull --rebase origin main
            git push
          fi
